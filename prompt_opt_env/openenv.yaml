name: prompt-opt-env
version: 0.1.0
description: >
  PromptOptEnv is a cost-aware Reinforcement Learning environment for task-adaptive
  prompt optimisation. Unlike existing tools (DSPy, TextGrad, OPRO) that maximise
  quality with unlimited token budgets, PromptOptEnv trains agents to maximise
  output quality per token spent. The reward is shaped by two competing objectives:
  ROUGE-L quality improvement minus a token cost penalty. Each task has a hard token
  budget; exceeding it terminates the episode with a penalty. A STOP action lets the
  agent voluntarily end the episode when quality is good enough for the tokens spent.
  This models real production constraints — every token costs money at inference scale.
  Includes 15 tasks (summarisation, QA, instruction-following, code explanation) with
  explicit easy/medium/hard difficulty and decreasing token budgets.
author: Shyam
license: BSD-3-Clause
python: ">=3.11"
entry_point: server.app:app
port: 8000
env_vars:
  - name: API_BASE_URL
    required: true
    secret: false
    description: OpenAI-compatible API endpoint (e.g. https://router.huggingface.co/v1/)
  - name: MODEL_NAME
    required: true
    secret: false
    description: Model identifier (e.g. Qwen/Qwen2.5-72B-Instruct)
  - name: OPENAI_API_KEY
    required: false
    secret: true
    description: API key for OpenAI-compatible providers (preferred)
  - name: OPENAI_BASE_URL
    required: false
    default: "https://api.openai.com/v1/"
    description: OpenAI provider base URL (OpenAI-compatible)
  - name: OPENAI_MODEL
    required: false
    default: "gpt-4o-mini"
    description: Model used when OpenAI provider is selected
  - name: GEMINI_API_KEY
    required: false
    secret: true
    description: Gemini API key (used via OpenAI-compatible endpoint)
  - name: GEMINI_BASE_URL
    required: false
    default: "https://generativelanguage.googleapis.com/v1beta/openai/"
    description: Gemini OpenAI-compatible base URL
  - name: GEMINI_MODEL
    required: false
    default: "gemini-2.5-flash"
    description: Model used when Gemini provider is selected
  - name: HF_TOKEN
    required: false
    secret: true
    description: HuggingFace token fallback when OPENAI_API_KEY is not set
  - name: MAX_STEPS
    required: false
    default: "7"
    description: Maximum steps per episode (includes STOP action)
  - name: DONE_THRESHOLD
    required: false
    default: "0.85"
    description: ROUGE-L above which episode ends with success bonus
  - name: TOKEN_PENALTY_ALPHA
    required: false
    default: "0.02"
    description: Cost penalty coefficient alpha in reward = quality_delta - alpha * token_overhead
  - name: USE_INTELLIGENT_ACTIONS
    required: false
    default: "true"
    description: Enable LLM-powered action transforms (falls back to deterministic actions on failure)
  - name: ACTION_LLM_TIMEOUT_SECONDS
    required: false
    default: "30"
    description: Timeout per intelligent action LLM call
  - name: ACTION_LLM_TEMPERATURE
    required: false
    default: "0.2"
    description: Sampling temperature for intelligent action rewrites
  - name: ACTION_LLM_MAX_CALLS
    required: false
    default: "250"
    description: Global cap on action rewrite LLM calls per process
  - name: ACTION_LLM_DRY_RUN
    required: false
    default: "false"
    description: If true, skip action rewrite API calls and force deterministic fallbacks
  - name: GRADER
    required: false
    default: "rouge"
    description: "rouge (no API, deterministic) or openai_client (real LLM)"
  - name: TASK_SEED
    required: false
    default: ""
    description: Integer 0-14. Fixes task selection for reproducibility.
tags:
  - nlp
  - prompt-engineering
  - reinforcement-learning
  - cost-aware
  - token-efficiency
  - llm
  - openenv
  - constrained-rl
